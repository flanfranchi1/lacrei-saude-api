# version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: lacrei_db
      POSTGRES_USER: lacrei_user
      POSTGRES_PASSWORD: lacrei_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://lacrei_user:lacrei_password@db:5432/lacrei_db
    depends_on:
      - db

volumes:
  postgres_data: